<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Essay Grader</title>

<style>

textarea{
width:100%;
max-width:600px;
font-size:16px;
}

button{
height:40px;
font-size:16px;
margin-top:10px;
}

</style>
</head>
<body>
  <h1>AI Essay Grader</h1>

<textarea id="essay" rows="10" placeholder="Write your essay here..."></textarea>

  <br><br>

  <button onclick="gradeEssay()">Grade Essay</button>

  <h2>AI Suggestion:</h2>
  <p id="suggestion"></p >

  <script>
    async function gradeEssay() {
      const text = document.getElementById("essay").value;

      const response = await fetch("/grade", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          essay: text
        })
      });

      const data = await response.json();
      document.getElementById("suggestion").innerText = data.result;
    }
  </script>
</body>
</html>
