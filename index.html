<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Essay Grader</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
padding:0;
background:#f5f5f7;
color:#111;
}

button,textarea{
font-family:inherit;
}

#introPage{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:24px;
}

#introPage h1{
font-size:32px;
margin-bottom:10px;
}

#introPage p{
color:#666;
margin-bottom:20px;
}

.main-btn{
background:black;
color:white;
border:none;
padding:14px 26px;
border-radius:999px;
font-size:16px;
cursor:pointer;
}

#appPage{
display:none;
max-width:900px;
margin:auto;
padding:30px;
}

textarea{
width:100%;
padding:16px;
border-radius:12px;
border:1px solid #ddd;
margin-top:10px;
font-size:16px;
}

.output{
background:white;
border:1px solid #eee;
border-radius:12px;
padding:16px;
margin-top:10px;
white-space:pre-wrap;
}

</style>
</head>

<body>

<div id="introPage">

<h1>如果你点开了，那就努力完成你心中的梦</h1>

<p>If you opened this, then work hard to complete the dream in your heart.</p >

<button class="main-btn" onclick="enterApp()">Start Free</button>

</div>

<div id="appPage">

<h1>AI Essay Grader</h1>

<textarea id="essay" placeholder="Write your essay here..."></textarea>

<button class="main-btn" onclick="gradeEssay()">Grade Essay</button>

<h2>AI Suggestion</h2>

<div id="suggestion" class="output"></div>

<h2>Ask AI About Your Essay</h2>

<textarea id="chatInput" placeholder="Ask about grammar, vocabulary, or how to improve your essay..."></textarea>

<button class="main-btn" onclick="askAI()">Send Question</button>

<h2>AI Chat</h2>

<div id="chatResponse" class="output"></div>

</div>

<script>

let currentEssay="";
let currentFeedback="";

function enterApp(){
document.getElementById("introPage").style.display="none";
document.getElementById("appPage").style.display="block";
}


async function gradeEssay(){

const essay=document.getElementById("essay").value.trim();

if(!essay){
document.getElementById("suggestion").innerText="Please write an essay first.";
return;
}

const lastEssay = localStorage.getItem("lastEssay");

let essayToSend = essay;

if(lastEssay && lastEssay !== essay){
essayToSend = `你需要批改这篇新作文，并和上一版作文进行对比。

上一版作文：
${lastEssay}

新版作文：
${essay}

请仍然按照下面格式返回：

Score:
（给出10分制分数）

Grammar:
（列出2-4个最明显的语法问题）

Vocabulary:
（列出2-4个词汇提升建议）

Improvement:
（给出2-3句更好的改写建议）

Teacher Comment:
（用自然、具体、不那么像AI套话的方式总结评价）

Progress Compared with Last Essay:
（重点说明这次比上一次提升了什么，哪里还有问题）`;
}

currentEssay=essay;

document.getElementById("suggestion").innerText="AI is grading your essay...";

const response=await fetch("/grade",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({essay:essayToSend})
});

const data=await response.json();

currentFeedback=data.result;

document.getElementById("suggestion").innerText=currentFeedback;

localStorage.setItem("lastEssay", essay);

}


async function askAI(){

const question=document.getElementById("chatInput").value.trim();

if(!question){
document.getElementById("chatResponse").innerText="Please type a question.";
return;
}

document.getElementById("chatResponse").innerText="AI is answering your question...";

const response=await fetch("/ask",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
essay:currentEssay||"",
feedback:currentFeedback||"",
question:question
})
});

const data=await response.json();

document.getElementById("chatResponse").innerText=data.result;

}

</script>

</body>
</html>
