<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Essay Helper</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#f5f5f5,#e9e9e9);
}

/* 封面 */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:36px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:#666;
max-width:500px;
}

button{
padding:14px 26px;
font-size:16px;
border:none;
border-radius:30px;
cursor:pointer;
margin-top:20px;
}

.primary{
background:black;
color:white;
}

.secondary{
background:#eee;
color:#333;
}

/* 主页面 */

.main{
max-width:700px;
margin:auto;
padding:20px;
display:none;
}

textarea{
width:100%;
min-height:160px;
font-size:16px;
padding:10px;
}

input,select{
width:100%;
padding:8px;
font-size:14px;
}

.result{
background:#f5f5f5;
padding:12px;
margin-top:10px;
white-space:pre-wrap;
}

</style>

</head>

<body>


<!-- 首页封面 -->

<div class="hero" id="hero">

<h1>如果你点开了，那就努力完成你心中的梦</h1>

<p>
If you opened this, then work hard to complete the dream in your heart.
</p >

<button class="primary" onclick="enterSite()">
Start Free
</button>

<button class="secondary" onclick="scrollInfo()">
Learn More
</button>

</div>


<!-- 主功能区 -->

<div class="main" id="main">

<h1>AI Essay Helper</h1>

<p>Write your essay and get instant feedback.</p >

<hr>

<h3>Optional: Tell AI about you</h3>

<label>Grade / 年级</label>
<input id="grade" placeholder="e.g. Grade 10 / 高二">

<br><br>

<label>Best Skill / 最擅长</label>

<select id="skill">
<option value="">Not sure</option>
<option>Writing</option>
<option>Speaking</option>
<option>Reading</option>
<option>Listening</option>
</select>

<br><br>

<label>Identity / 身份</label>

<select id="identity">
<option value="">Student</option>
<option>International student</option>
<option>Overseas student</option>
</select>

<br><br>

<label>Goal / 使用目的</label>

<select id="goal">
<option value="">Improve English</option>
<option>IELTS preparation</option>
<option>School exam</option>
<option>Daily communication</option>
</select>

<hr>

<h3>Your Essay</h3>

<textarea id="essay" placeholder="Write your essay here..."></textarea>

<button class="primary" onclick="gradeEssay()">Grade Essay</button>

<h3>AI Feedback</h3>

<div class="result" id="suggestion"></div>

<hr>

<h3>Ask AI about your essay</h3>

<textarea id="chatInput" placeholder="Ask grammar questions or how to improve your essay..."></textarea>

<button class="primary" onclick="askAI()">Send Question</button>

<h3>AI Chat</h3>

<div class="result" id="chatResponse"></div>

</div>


<script>

/* 进入网站 */

function enterSite(){

document.getElementById("hero").style.display="none";
document.getElementById("main").style.display="block";

}

/* Learn more 向下滚 */

function scrollInfo(){

window.scrollTo({
top:window.innerHeight,
behavior:"smooth"
});

}

/* 作文批改 */

async function gradeEssay(){

const essay=document.getElementById("essay").value;

const grade=document.getElementById("grade").value;
const skill=document.getElementById("skill").value;
const identity=document.getElementById("identity").value;
const goal=document.getElementById("goal").value;

document.getElementById("suggestion").innerText="AI is thinking...";

const response=await fetch("/grade",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
essay,
grade,
skill,
identity,
goal
})

});

const data=await response.json();

document.getElementById("suggestion").innerText=data.result;

}

/* AI问答 */

async function askAI(){

const question=document.getElementById("chatInput").value;

const essay=document.getElementById("essay").value;

const feedback=document.getElementById("suggestion").innerText;

document.getElementById("chatResponse").innerText="AI is thinking...";

const response=await fetch("/ask",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
essay,
feedback,
question
})

});

const data=await response.json();

document.getElementById("chatResponse").innerText=data.result;

}

</script>

</body>

</html>
