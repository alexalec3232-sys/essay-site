<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Essay Grader</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
    }

    .hero {
      text-align: center;
      padding: 60px 20px 40px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #666;
      font-size: 18px;
      margin: 8px 0;
    }

    .hero button {
      margin-top: 20px;
      padding: 12px 24px;
      border: none;
      border-radius: 999px;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      max-width: 700px;
      font-size: 16px;
      min-height: 160px;
      display: block;
      margin: 20px auto 0;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .main-btn {
      display: block;
      margin: 16px auto;
      height: 44px;
      padding: 0 24px;
      font-size: 16px;
      border: none;
      border-radius: 999px;
      background: black;
      color: white;
      cursor: pointer;
    }

    h2 {
      max-width: 700px;
      margin: 28px auto 12px;
    }

    p {
      max-width: 700px;
      margin: 0 auto 16px;
      line-height: 1.7;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>AI Essay Grader</h1>
    <p>Get instant feedback on your English essays.</p >
    <button onclick="document.getElementById('essay').scrollIntoView({behavior:'smooth'})">
      Start Grading
    </button>
  </div>

  <textarea id="essay" rows="10" placeholder="Write your essay here..."></textarea>

  <button id="gradeBtn" class="main-btn" onclick="gradeEssay()">Grade Essay</button>

  <h2>AI Suggestion:</h2>
  <p id="suggestion"></p >

  <h2>Ask AI about your essay:</h2>
  <textarea id="chatInput" rows="4" placeholder="Ask about grammar, vocabulary, or how to improve your essay..."></textarea>

  <button class="main-btn" onclick="askAI()">Send Question</button>

  <h2>AI Chat:</h2>
  <p id="chatResponse"></p >

  <script>
    let currentEssay = "";
    let currentFeedback = "";

    async function gradeEssay() {
      const btn = document.getElementById("gradeBtn");
      const text = document.getElementById("essay").value;

      if (!text.trim()) {
        document.getElementById("suggestion").innerText = "Please write an essay first.";
        return;
      }

      currentEssay = text;
      btn.innerText = "Grading...";
      btn.disabled = true;

      document.getElementById("suggestion").innerText = "AI is grading your essay...";

      const response = await fetch("/grade", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          essay: text
        })
      });

      const data = await response.json();
      currentFeedback = data.result;
      document.getElementById("suggestion").innerText = data.result;

      btn.innerText = "Grade Essay";
      btn.disabled = false;
    }

    async function askAI() {
      const question = document.getElementById("chatInput").value;

      if (!question.trim()) {
        document.getElementById("chatResponse").innerText = "Please type a question first.";
        return;
      }

      if (!currentEssay || !currentFeedback) {
        document.getElementById("chatResponse").innerText =
          "Please grade an essay first before asking questions.";
        return;
      }

      document.getElementById("chatResponse").innerText = "AI is answering your question...";

      const response = await fetch("/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          essay: currentEssay,
          feedback: currentFeedback,
          question: question
        })
      });

      const data = await response.json();
      document.getElementById("chatResponse").innerText = data.result;
    }
  </script>
</body>
</html>
