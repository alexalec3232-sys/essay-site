<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Essay Grader</title>

<style>

body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  text-align:center;
  background:#f5f5f5;
}

#introPage{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

#introPage h1{
  font-size:48px;
  margin-bottom:10px;
}

#introPage p{
  font-size:18px;
  color:#555;
  max-width:600px;
}

button{
  margin-top:20px;
  padding:12px 24px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:black;
  color:white;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}

#appPage{
  padding:40px;
}

textarea{
  width:90%;
  max-width:700px;
  height:200px;
  padding:10px;
  font-size:16px;
  border-radius:8px;
  border:1px solid #ccc;
}

</style>
</head>


<body>


<!-- Intro Page -->

<div id="introPage">

<h1>AI Essay Grader</h1>

<p>Improve your English writing with instant AI feedback.</p >

<p>Grammar correction • Vocabulary improvement • Teacher comments</p >

<button onclick="enterApp()">Enter</button>

</div>



<!-- App Page -->

<div id="appPage" style="display:none;">

<h1>AI Essay Grader</h1>

<textarea id="essay" placeholder="Write your essay here..."></textarea>

<br>

<button onclick="gradeEssay()">Grade Essay</button>

<h2>AI Suggestion</h2>

<p id="suggestion"></p >


<h2>Ask AI about your essay</h2>

<textarea id="chatInput" placeholder="Ask about grammar or improvements..."></textarea>

<br>

<button onclick="askAI()">Send Question</button>

<h2>AI Chat</h2>

<p id="chatResponse"></p >

</div>



<script>


function enterApp(){

document.getElementById("introPage").style.display="none";

document.getElementById("appPage").style.display="block";

}



let currentEssay="";
let currentFeedback="";


async function gradeEssay(){

const essay=document.getElementById("essay").value;

if(!essay){

alert("Please write an essay first.");

return;

}

document.getElementById("suggestion").innerText="Grading...";


const response=await fetch("/grade",{

method:"POST",

headers:{ "Content-Type":"application/json" },

body:JSON.stringify({ essay:essay })

});


const data=await response.json();

document.getElementById("suggestion").innerText=data.result;

currentEssay=essay;

currentFeedback=data.result;

}



async function askAI(){

const question=document.getElementById("chatInput").value;

if(!question){

return;

}

document.getElementById("chatResponse").innerText="AI is answering...";


const response=await fetch("/grade",{

method:"POST",

headers:{ "Content-Type":"application/json" },

body:JSON.stringify({

essay: currentEssay + "\n\nUser question: " + question + "\n\nTeacher feedback: " + currentFeedback

})

});


const data=await response.json();

document.getElementById("chatResponse").innerText=data.result;

}



</script>


</body>
</html>
