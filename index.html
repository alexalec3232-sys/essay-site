<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Essay Grader</title>

<style>

.hero{
  text-align:center;
  padding:80px 20px;
}

.hero h1{
  font-size:40px;
  margin-bottom:10px;
}

.hero p{
  color:#666;
  font-size:18px;
}

.hero button{
  margin-top:20px;
  padding:12px 24px;
  border:none;
  border-radius:999px;
  background:black;
  color:white;
  font-size:16px;
  cursor:pointer;
}

textarea{
width:100%;
max-width:600px;
font-size:16px;
}

button{
height:40px;
font-size:16px;
margin-top:10px;
}

</style>

</head>
<body>

<div class="hero">
  <h1>AI Essay Grader</h1>
  <p>Get instant feedback on your English essays.</p >
  <button onclick="document.getElementById('essay').scrollIntoView()">
    Start Grading
  </button>
</div>

<textarea id="essay" rows="10" placeholder="Write your essay here..."></textarea>

  <br><br>

  <button onclick="gradeEssay()">Grade Essay</button>

  <h2>AI Suggestion:</h2>
  <p id="suggestion"></p >

    </body>

  <script>
    async function gradeEssay() {
      const text = document.getElementById("essay").value;

      document.getElementById("suggestion").innerText = "AI is grading your essay...";

      const response = await fetch("/grade", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          essay: text
        })
      });

      const data = await response.json();
      document.getElementById("suggestion").innerText = data.result;
    }
  </script>
</body>
</html>
